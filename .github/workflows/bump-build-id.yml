name: Bump build id

on:
  push:
    branches: [main]
    paths-ignore:
      - 'build-id.txt'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write build-id.txt
        run: date -u +"%Y-%m-%dT%H-%M-%SZ" > build-id.txt
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build-id.txt
          if git diff --staged --quiet; then
            echo "build-id unchanged"
            exit 0
          fi
          git commit -m "chore: bump build-id after deploy"
          git push
