<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Capital crown">
  <!-- Civ-style capital crown -->
  <defs>
    <linearGradient id="crownGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff1a0"/>
      <stop offset="40%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="crownGem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec8ff"/>
      <stop offset="100%" stop-color="#2a6bb5"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="#1a1520" stroke="url(#crownGold)" stroke-width="2"/>
  <!-- band -->
  <path fill="url(#crownGold)" d="M14 42 h36 v6 H14z"/>
  <path fill="#1a1520" opacity=".25" d="M14 42 h36 v2 H14z"/>
  <!-- crown body: three arches + side peaks -->
  <path fill="url(#crownGold)" d="
    M16 42
    L14 24 L22 34
    L32 16 L42 34
    L50 24 L48 42
    Z"/>
  <!-- jewels -->
  <circle cx="32" cy="22" r="2.6" fill="url(#crownGem)" stroke="#1a1520" stroke-width="0.8"/>
  <circle cx="22" cy="34" r="2" fill="#c0392b" stroke="#1a1520" stroke-width="0.7"/>
  <circle cx="42" cy="34" r="2" fill="#27ae60" stroke="#1a1520" stroke-width="0.7"/>
  <!-- top tip -->
  <circle cx="32" cy="14.5" r="1.8" fill="url(#crownGold)"/>
</svg>
