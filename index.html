        .faq-body li {

            gap: 20px;

            margin-bottom: 8px;
            color: #ffd700;
            font-weight: 600;
        }

            margin-top: 20px;

            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: #ffd700;
        }

        .game-version {

            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: inline-block;
            border: 1px solid rgba(255, 215, 0, 0.3);

            background: rgba(255, 215, 0, 0.2);

        .replay-button:active {

        }

            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            border: 2px solid #ffd700;
        }

        .replay-gif.show {
            display: block;
            animation: fadeIn 0.3s;
        }

            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            grid-column: 1 / -1;
        }

            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: space-around;

        .stat-item {
            text-align: center;

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #ffd700;
            grid-column: 1 / -1;
        }

        .error {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #ff6b6b;
            grid-column: 1 / -1;
        }

        footer {
            text-align: center;
            margin-top: 50px;

            color: rgba(255, 255, 255, 0.5);

            0% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.8); }
            100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
        }

</head>

        return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
    }

            return `${CONFIG.nationsPath}${encodeURIComponent(englishName)}.png`;
        }
        console.warn(`Иконка для нации "${russianName}" не найдена`);
        return `${CONFIG.nationsPath}Unknown.png`;
    }

    function getNationColors(russianName) {
        const englishName = nationMap.get(russianName);
        if (englishName && nationColors[englishName]) {
            return nationColors[englishName];
        }
        return nationColorFallback;
    }

    const portraitCache = new Map();
    const imageCache = new Map();

    function loadImage(url) {
        if (imageCache.has(url)) return imageCache.get(url);
        const promise = new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = url;
        });
        imageCache.set(url, promise);
        return promise;
    }

    /**
     * Solid-pixel bbox (for scale) + alpha centroid (for centering).
     * Soft halos (Ukraine etc.) skew a low-threshold bbox; mass stays stable.
     */
    function getAlphaLayout(img, solidThr = 128, massThr = 24) {
        const w = img.naturalWidth || img.width;
        const h = img.naturalHeight || img.height;
        const c = document.createElement('canvas');
        c.width = w;
        c.height = h;
        const ctx = c.getContext('2d', { willReadFrequently: true });
        ctx.drawImage(img, 0, 0);
        const data = ctx.getImageData(0, 0, w, h).data;

        let minX = w, minY = h, maxX = -1, maxY = -1;
        let sumA = 0, sumX = 0, sumY = 0;

        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const a = data[(y * w + x) * 4 + 3];
                if (a >= solidThr) {
                    if (x < minX) minX = x;
                    if (y < minY) minY = y;
                    if (x > maxX) maxX = x;
                    if (y > maxY) maxY = y;
                }
                if (a >= massThr) {
                    sumA += a;
                    sumX += x * a;
                    sumY += y * a;
                }
            }
        }

        const box = maxX < 0
            ? { x: 0, y: 0, w, h }
            : { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };

        const massX = sumA > 0 ? sumX / sumA : box.x + box.w / 2;
        const massY = sumA > 0 ? sumY / sumA : box.y + box.h / 2;

        return { box, massX, massY, imgW: w, imgH: h };
    }

    /**
     * Unciv PortraitNation: outerColor fill, innerColor ring + silhouette.
     * Scale by solid alpha bbox; center by alpha centroid (RekMOD-safe).
     */
    async function buildNationPortraitDataUrl(russianName, size) {
        const colors = getNationColors(russianName);
        const iconUrl = getNationIconPath(russianName);
        const cacheKey = `${iconUrl}|${colors.outer}|${colors.inner}|${size}|v2`;
        if (portraitCache.has(cacheKey)) return portraitCache.get(cacheKey);

        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const cx = size / 2;
        const cy = size / 2;
        const ring = Math.max(1.5, size * 0.08);
        const outerR = size / 2 - ring / 2;

        ctx.beginPath();
        ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
        ctx.fillStyle = rgbCss(colors.outer);
        ctx.fill();
        ctx.lineWidth = ring;
        ctx.strokeStyle = rgbCss(colors.inner);
        ctx.stroke();

        try {
            const img = await loadImage(iconUrl);
            const { box, massX, massY } = getAlphaLayout(img);
            const pad = size * 0.18;
            const avail = size - pad * 2;
            const scale = Math.min(avail / box.w, avail / box.h);

            // Place image so the alpha centroid lands on the circle center.
            const dx = cx - massX * scale;
            const dy = cy - massY * scale;
            const dw = (img.naturalWidth || img.width) * scale;
            const dh = (img.naturalHeight || img.height) * scale;

            const iconCanvas = document.createElement('canvas');
            iconCanvas.width = size;
            iconCanvas.height = size;
            const ictx = iconCanvas.getContext('2d');
            ictx.drawImage(img, 0, 0, img.naturalWidth || img.width, img.naturalHeight || img.height, dx, dy, dw, dh);
            ictx.globalCompositeOperation = 'source-in';
            ictx.fillStyle = rgbCss(colors.inner);
            ictx.fillRect(0, 0, size, size);

            ctx.drawImage(iconCanvas, 0, 0);
        } catch (e) {
            console.warn('portrait icon failed', russianName, e);
        }

        const dataUrl = canvas.toDataURL('image/png');
        portraitCache.set(cacheKey, dataUrl);
        return dataUrl;
    }

    function renderNationPortrait(russianName, extraClass) {
        const size = extraClass && extraClass.includes('player-nation-mini') ? 20 : 24;
        const cls = ['nation-portrait', extraClass].filter(Boolean).join(' ');
        return `<span class="${cls}" data-nation="${russianName}" data-size="${size}" ` +
            `role="img" aria-label="${russianName}"></span>`;
    }

    async function hydrateNationPortraits(root) {
        const nodes = [...(root || document).querySelectorAll('.nation-portrait[data-nation]')];
        await Promise.all(nodes.map(async (el) => {
            if (el.querySelector('img')) return;
            const name = el.dataset.nation;
            const size = Number(el.dataset.size) || 24;
            try {
                const src = await buildNationPortraitDataUrl(name, size * 2);
                const img = document.createElement('img');
                img.src = src;
                img.alt = name;
                el.appendChild(img);
            } catch (e) {
                console.warn('hydrate portrait failed', name, e);
            }
        }));
    }

    // Заполняем фильтр наций
    function populateNationFilter() {
        const filterSelect = document.getElementById('nationFilter');
        const sortedNations = Array.from(allNations).sort((a, b) => a.localeCompare(b, 'ru'));

        filterSelect.innerHTML = '<option value="all">Все нации</option>';
        sortedNations.forEach(nation => {
            const option = document.createElement('option');
            option.value = nation;
            option.textContent = nation;
            filterSelect.appendChild(option);
        });
    }

    // Обновляем статистику
    function updateStats() {
        const totalGames = gamesData.length;
        const allPlayers = new Set();

        gamesData.forEach(game => {
            game.players.forEach(player => allPlayers.add(player.name));
        });

        document.getElementById('totalGames').textContent = totalGames;
        document.getElementById('uniqueNations').textContent = allNations.size;
        document.getElementById('uniquePlayers').textContent = allPlayers.size;
    }

    // Отображение игр
    function displayGames(gamesToShow) {
        const grid = document.getElementById('gamesGrid');
        grid.innerHTML = '';

        if (gamesToShow.length === 0) {
            grid.innerHTML = '<div class="no-games">😢 Игр не найдено</div>';
            return;
        }

        const searchQuery = document.getElementById('playerSearch').value.toLowerCase();

        gamesToShow.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';

            const playersHtml = game.players.map(player => {
                const isWinner = player.nation === game.winner;
                const isHighlighted = searchQuery && player.name.toLowerCase().includes(searchQuery);

                return `
                    <div class="player-item ${isHighlighted ? 'highlighted' : ''}">
                        ${renderNationPortrait(player.nation, 'player-nation-mini')}
                        <span class="player-name">${player.name}</span>
                        ${isWinner ? '<span class="player-status">👑 Победитель</span>' : ''}
                    </div>
                `;
            }).join('');

            const survivors = Array.isArray(game.survivors) ? game.survivors : [];
            const survivorsHtml = survivors.length
                ? survivors.map(row => {
                    const isWinner = row.nation === game.winner;
                    const ideology = (row.ideology || '').trim();
                    const wonders = Array.isArray(row.wonders) ? row.wonders.filter(Boolean) : [];
                    const name = (row.name || '').trim() || '—';
                    return `
                        <div class="survivor-item">
                            <div class="survivor-head">
                                ${renderNationPortrait(row.nation, 'player-nation-mini')}
                                <span class="player-name">${name}</span>
                                ${isWinner ? '<span class="player-status">👑 Победитель</span>' : ''}
                            </div>
                            <div class="survivor-meta">
                                ${row.nation || ''}
                                ${ideology ? ` · <span class="survivor-ideology">${ideology}</span>` : ' · идеология не принята'}
                            </div>
                            <div class="survivor-wonders">
                                ${wonders.length ? `Чудеса: ${wonders.join(', ')}` : 'Чудес нет'}
                            </div>
                        </div>
                    `;
                }).join('')
                : '<div class="survivors-empty">Нет данных о финале (появится после синка из сейва)</div>';

            const hasGif = game.gif && game.gif.trim() !== '';

            card.innerHTML = `
                <div class="game-header">
                    <span class="game-number">🌍 ${game.number || `Session ${game.id}`}</span>
                    <span class="game-version">${game.version || 'Версия не указана'}</span>
                </div>
                ${game.map ? `<div class="game-map">🗺️ ${game.map}</div>` : ''}
                <div class="winner-section">
                    <span class="winner-label">🏆 ПОБЕДИТЕЛЬ:</span>
                    <span class="winner-nation">
                        ${renderNationPortrait(game.winner, 'nation-icon-small')}
                        ${game.winner}
                    </span>
                </div>
                <div class="card-tabs">
                    <button type="button" class="card-tab active" data-tab="roster">Состав</button>
                    <button type="button" class="card-tab" data-tab="survivors">Финал</button>
                </div>
                <div class="card-tab-panel active" data-panel="roster">
                    <div class="players-list">${playersHtml}</div>
                </div>
                <div class="card-tab-panel" data-panel="survivors">
                    <div class="players-list">${survivorsHtml}</div>
                </div>
                ${hasGif ? `
                    <button class="replay-button" data-replay="${game.gif}">🎬 Смотреть реплей</button>
                    <img class="replay-gif" src="${game.gif}" alt="Replay" data-game-id="${game.id}"
                         onerror="this.style.display='none'; this.previousElementSibling.style.display='none';">
                ` : ''}
            `;

            grid.appendChild(card);
        });

        hydrateNationPortraits(grid);

        grid.querySelectorAll('.game-card').forEach(card => {
            const tabs = card.querySelectorAll('.card-tab');
            const panels = card.querySelectorAll('.card-tab-panel');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.dataset.tab;
                    tabs.forEach(t => t.classList.toggle('active', t === tab));
                    panels.forEach(p => p.classList.toggle('active', p.dataset.panel === target));
                });
            });
        });

        // Обработчики для кнопок реплея
        document.querySelectorAll('.replay-button').forEach(button => {
            const replayGif = button.nextElementSibling;
            if (replayGif?.tagName === 'IMG') {
                replayGif.addEventListener('error', () => button.style.display = 'none');
                button.addEventListener('click', function() {
                    replayGif.classList.toggle('show');
                    this.textContent = replayGif.classList.contains('show') ? '🎬 Скрыть реплей' : '🎬 Смотреть реплей';
                });
            }
        });
    }

    // Фильтрация
    function filterGames() {
        const nationFilter = document.getElementById('nationFilter').value;
        const playerSearch = document.getElementById('playerSearch').value.toLowerCase();
        const sortFilter = document.getElementById('sortFilter').value;

        let filtered = gamesData.filter(game => {
            if (nationFilter !== 'all' && !game.players.some(p => p.nation === nationFilter))
                return false;
            if (playerSearch && !game.players.some(p => p.name.toLowerCase().includes(playerSearch)))
                return false;
            return true;
        });

        filtered.sort((a, b) => sortFilter === 'newest' ? b.id - a.id : a.id - b.id);
        displayGames(filtered);
    }

    // Загрузка данных
    async function loadGamesData() {
        try {
            const [gamesResponse, colorsResponse] = await Promise.all([
                fetch('Games.json'),
                fetch(CONFIG.colorsPath),
            ]);
            if (!gamesResponse.ok) throw new Error(`HTTP ${gamesResponse.status}`);

            if (colorsResponse.ok) {
                const colorsData = await colorsResponse.json();
                nationColors = colorsData.colors || {};
                if (colorsData.fallback) {
                    nationColorFallback = colorsData.fallback;
                }
            } else {
                console.warn('nation_colors.json не загружен, иконки без tint');
            }

            const data = await gamesResponse.json();
            gamesData = data.games;

            gamesData.forEach(game => {
                game.players?.forEach(player => allNations.add(player.nation));
            });

            populateNationFilter();
            updateStats();
            filterGames();

        } catch (error) {
            console.error('Ошибка:', error);
            document.getElementById('gamesGrid').innerHTML =
                '<div class="error">❌ Ошибка загрузки данных. Проверьте консоль (F12)</div>';
        }
    }

    // Запуск
    loadGamesData();
    loadFaqData();

    // Переключение разделов
    document.querySelectorAll('.site-nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const view = btn.dataset.view;
            document.querySelectorAll('.site-nav-btn').forEach(b => {
                b.classList.toggle('active', b === btn);
            });
            document.getElementById('viewArchive').classList.toggle('active', view === 'archive');
            document.getElementById('viewFaq').classList.toggle('active', view === 'faq');
            const title = document.getElementById('pageTitle');
            title.textContent = view === 'faq' ? '📖 FAQ' : '⚔️ Архив игр 🛡️';
            document.querySelector('footer p').textContent = view === 'faq'
                ? 'Правила и подсказки Iron League'
                : '📁 Хранилище реплеев | Нажмите на кнопку "Смотреть реплей" чтобы загрузить GIF';
        });
    });

    async function loadFaqData() {
        const content = document.getElementById('faqContent');
        const toc = document.getElementById('faqToc');
        const sourceEl = document.getElementById('faqSource');
        try {
            const response = await fetch('faq.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const sections = Array.isArray(data.sections) ? data.sections : [];

            if (data.source) {
                sourceEl.innerHTML =
                    `Источник: <a href="${data.source}" target="_blank" rel="noopener">Google Doc</a>`;
            } else {
                sourceEl.textContent = '';
            }

            toc.innerHTML = sections.map((section, idx) => {
                const id = `faq-sec-${idx}`;
                return `<a href="#${id}">${section.title}</a>`;
            }).join('');

            content.innerHTML = sections.map((section, idx) => {
                const id = `faq-sec-${idx}`;
                return `
                    <section class="faq-section" id="${id}">
                        <h2>${section.title}</h2>
                        <div class="faq-body">${section.html || ''}</div>
                    </section>
                `;
            }).join('');
        } catch (error) {
            console.error('FAQ error:', error);
            sourceEl.textContent = '';
            content.innerHTML = '<div class="error">❌ Не удалось загрузить FAQ</div>';
        }
    }

    // События фильтров
    document.getElementById('nationFilter').addEventListener('change', filterGames);
    document.getElementById('playerSearch').addEventListener('input', filterGames);
    document.getElementById('sortFilter').addEventListener('change', filterGames);
</script>
</body>
</html>
