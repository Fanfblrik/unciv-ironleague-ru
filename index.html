<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архив игр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: #f0f0f0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin: 30px 0;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
        }

        .filters {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffd700;
            font-weight: 600;
        }

        .filter-group select, .filter-group input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .filter-group select option {
            background: #2a2a40;
        }

        .filter-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: #ffd700;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .game-number {
            color: #ffd700;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .game-version {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        .game-map {
            background: rgba(255, 215, 0, 0.1);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: inline-block;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .winner-section {
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            padding: 10px;
            margin: 15px 0;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .winner-label {
            font-size: 0.9rem;
            color: #ffd700;
            margin-right: 10px;
        }

        .winner-nation {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd700;
        }

        /* Unciv-style portrait: outerColor fill, innerColor ring + icon tint */
        .nation-portrait {
            --outer: #505050;
            --inner: #ffffff;
            --icon: none;
            position: relative;
            display: inline-block;
            flex-shrink: 0;
            border-radius: 50%;
            background: var(--outer);
            box-shadow: 0 0 0 2px var(--inner);
            vertical-align: middle;
        }

        .nation-portrait::after {
            content: '';
            position: absolute;
            inset: 12%;
            background-color: var(--inner);
            -webkit-mask-image: var(--icon);
            mask-image: var(--icon);
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
        }

        .nation-icon-small {
            width: 24px;
            height: 24px;
        }

        .player-nation-mini.nation-portrait,
        .nation-portrait.player-nation-mini {
            width: 20px;
            height: 20px;
            box-shadow: 0 0 0 1.5px var(--inner);
        }

        .players-list {
            margin: 15px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .player-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-item:last-child {
            border-bottom: none;
        }

        .player-name {
            flex: 1;
            color: rgba(255, 255, 255, 0.9);
        }

        .player-status {
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 12px;
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .replay-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #ffd700, #ffa500);
            border: none;
            border-radius: 10px;
            color: #1e1e2f;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: opacity 0.3s;
            margin-top: 15px;
        }

        .replay-button:hover {
            opacity: 0.9;
        }

        .replay-button:active {
            transform: scale(0.98);
        }

        .replay-gif {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            border: 2px solid #ffd700;
        }

        .replay-gif.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        .no-games {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            grid-column: 1 / -1;
        }

        .stats-bar {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #ffd700;
            grid-column: 1 / -1;
        }

        .error {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #ff6b6b;
            grid-column: 1 / -1;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Подсветка найденного игрока */
        .player-item.highlighted {
            background: rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            padding: 5px 10px;
            margin: 2px -10px;
            border: 1px solid #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.8); }
            100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚔️ Архив игр 🛡️</h1>

    <div class="filters">
        <div class="filter-group">
            <label>Фильтр по нации</label>
            <select id="nationFilter">
                <option value="all">Все нации</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Поиск по игроку</label>
            <input type="text" id="playerSearch" placeholder="Введите никнейм...">
        </div>
        <div class="filter-group">
            <label>Сортировка</label>
            <select id="sortFilter">
                <option value="newest">Сначала новые</option>
                <option value="oldest">Сначала старые</option>
            </select>
        </div>
    </div>

    <div class="stats-bar" id="statsBar">
        <div class="stat-item">
            <div class="stat-value" id="totalGames">0</div>
            <div class="stat-label">Всего игр</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="uniqueNations">0</div>
            <div class="stat-label">Наций</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="uniquePlayers">0</div>
            <div class="stat-label">Игроков</div>
        </div>
    </div>

    <div class="games-grid" id="gamesGrid">
        <div class="loading">Загрузка данных...</div>
    </div>
</div>

<footer>
    <p>📁 Хранилище реплеев | Нажмите на кнопку "Смотреть реплей" чтобы загрузить GIF</p>
</footer>

        { eng: "Ukraine", rus: "Украина" },

        { eng: "Vietnam", rus: "Вьетнам" },
        { eng: "Wales", rus: "Уэльс" },
        { eng: "Yugoslavia", rus: "Югославия" },
        { eng: "Zimbabwe", rus: "Зимбабве" },
        { eng: "Zulu", rus: "Зулусы" }
    ];

    // Создаем Map для быстрого поиска: русское название -> английское
    const nationMap = new Map();
    nations.forEach(item => {
        nationMap.set(item.rus, item.eng);
    });

    // Цвета наций (Unciv + RekMOD): eng -> {outer, inner}
    let nationColors = {};
    let nationColorFallback = { outer: [80, 80, 80], inner: [255, 255, 255] };

    // Глобальные переменные
    let gamesData = [];
    let allNations = new Set();

    function rgbCss(rgb) {
        if (!Array.isArray(rgb) || rgb.length < 3) return '#808080';
        return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
    }

    // Функция для получения пути к иконке нации
    function getNationIconPath(russianName) {
        const englishName = nationMap.get(russianName);
        if (englishName) {
            return `${CONFIG.nationsPath}${encodeURIComponent(englishName)}.png`;
        }
        console.warn(`Иконка для нации "${russianName}" не найдена`);
        return `${CONFIG.nationsPath}Unknown.png`;
    }

    function getNationColors(russianName) {
        const englishName = nationMap.get(russianName);
        if (englishName && nationColors[englishName]) {
            return nationColors[englishName];
        }
        return nationColorFallback;
    }

    /** Unciv PortraitNation: круг outerColor, кольцо+силуэт innerColor. */
    function renderNationPortrait(russianName, extraClass) {
        const colors = getNationColors(russianName);
        const iconUrl = getNationIconPath(russianName);
        const cls = ['nation-portrait', extraClass].filter(Boolean).join(' ');
        return `<span class="${cls}" role="img" aria-label="${russianName}" ` +
            `style="--outer:${rgbCss(colors.outer)};--inner:${rgbCss(colors.inner)};` +
            `--icon:url('${iconUrl}')"></span>`;
    }

    // Заполняем фильтр наций
    function populateNationFilter() {
        const filterSelect = document.getElementById('nationFilter');
        const sortedNations = Array.from(allNations).sort((a, b) => a.localeCompare(b, 'ru'));

        filterSelect.innerHTML = '<option value="all">Все нации</option>';
        sortedNations.forEach(nation => {
            const option = document.createElement('option');
            option.value = nation;
            option.textContent = nation;
            filterSelect.appendChild(option);
        });
    }

    // Обновляем статистику
    function updateStats() {
        const totalGames = gamesData.length;
        const allPlayers = new Set();

        gamesData.forEach(game => {
            game.players.forEach(player => allPlayers.add(player.name));
        });

        document.getElementById('totalGames').textContent = totalGames;
        document.getElementById('uniqueNations').textContent = allNations.size;
        document.getElementById('uniquePlayers').textContent = allPlayers.size;
    }

    // Отображение игр
    function displayGames(gamesToShow) {
        const grid = document.getElementById('gamesGrid');
        grid.innerHTML = '';

        if (gamesToShow.length === 0) {
            grid.innerHTML = '<div class="no-games">😢 Игр не найдено</div>';
            return;
        }

        const searchQuery = document.getElementById('playerSearch').value.toLowerCase();

        gamesToShow.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';

            const playersHtml = game.players.map(player => {
                const isWinner = player.nation === game.winner;
                const isHighlighted = searchQuery && player.name.toLowerCase().includes(searchQuery);

                return `
                    <div class="player-item ${isHighlighted ? 'highlighted' : ''}">
                        ${renderNationPortrait(player.nation, 'player-nation-mini')}
                        <span class="player-name">${player.name}</span>
                        ${isWinner ? '<span class="player-status">👑 Победитель</span>' : ''}
                    </div>
                `;
            }).join('');

            const hasGif = game.gif && game.gif.trim() !== '';

            card.innerHTML = `
                <div class="game-header">
                    <span class="game-number">🌍 ${game.number || `Session ${game.id}`}</span>
                    <span class="game-version">${game.version || 'Версия не указана'}</span>
                </div>
                ${game.map ? `<div class="game-map">🗺️ ${game.map}</div>` : ''}
                <div class="winner-section">
                    <span class="winner-label">🏆 ПОБЕДИТЕЛЬ:</span>
                    <span class="winner-nation">
                        ${renderNationPortrait(game.winner, 'nation-icon-small')}
                        ${game.winner}
                    </span>
                </div>
                <div class="players-list">${playersHtml}</div>
                ${hasGif ? `
                    <button class="replay-button" data-replay="${game.gif}">🎬 Смотреть реплей</button>
                    <img class="replay-gif" src="${game.gif}" alt="Replay" data-game-id="${game.id}"
                         onerror="this.style.display='none'; this.previousElementSibling.style.display='none';">
                ` : ''}
            `;

            grid.appendChild(card);
        });

        // Обработчики для кнопок реплея
        document.querySelectorAll('.replay-button').forEach(button => {
            const replayGif = button.nextElementSibling;
            if (replayGif?.tagName === 'IMG') {
                replayGif.addEventListener('error', () => button.style.display = 'none');
                button.addEventListener('click', function() {
                    replayGif.classList.toggle('show');
                    this.textContent = replayGif.classList.contains('show') ? '🎬 Скрыть реплей' : '🎬 Смотреть реплей';
                });
            }
        });
    }

    // Фильтрация
    function filterGames() {
        const nationFilter = document.getElementById('nationFilter').value;
        const playerSearch = document.getElementById('playerSearch').value.toLowerCase();
        const sortFilter = document.getElementById('sortFilter').value;

        let filtered = gamesData.filter(game => {
            if (nationFilter !== 'all' && !game.players.some(p => p.nation === nationFilter))
                return false;
            if (playerSearch && !game.players.some(p => p.name.toLowerCase().includes(playerSearch)))
                return false;
            return true;
        });

        filtered.sort((a, b) => sortFilter === 'newest' ? b.id - a.id : a.id - b.id);
        displayGames(filtered);
    }

    // Загрузка данных
    async function loadGamesData() {
        try {
            const [gamesResponse, colorsResponse] = await Promise.all([
                fetch('Games.json'),
                fetch(CONFIG.colorsPath),
            ]);
            if (!gamesResponse.ok) throw new Error(`HTTP ${gamesResponse.status}`);

            if (colorsResponse.ok) {
                const colorsData = await colorsResponse.json();
                nationColors = colorsData.colors || {};
                if (colorsData.fallback) {
                    nationColorFallback = colorsData.fallback;
                }
            } else {
                console.warn('nation_colors.json не загружен, иконки без tint');
            }

            const data = await gamesResponse.json();
            gamesData = data.games;

            gamesData.forEach(game => {
                game.players?.forEach(player => allNations.add(player.nation));
            });

            populateNationFilter();
            updateStats();
            filterGames();

        } catch (error) {
            console.error('Ошибка:', error);
            document.getElementById('gamesGrid').innerHTML =
                '<div class="error">❌ Ошибка загрузки данных. Проверьте консоль (F12)</div>';
        }
    }

    // Запуск
    loadGamesData();

    // События фильтров
    document.getElementById('nationFilter').addEventListener('change', filterGames);
    document.getElementById('playerSearch').addEventListener('input', filterGames);
    document.getElementById('sortFilter').addEventListener('change', filterGames);
</script>
</body>
</html>
